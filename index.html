<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtractry</title>
  </head>
  <body>
    <div id="error-container" style="color: red; padding: 20px; font-family: monospace;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('error-container').innerText += event.error ? event.error.stack : event.message + '\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-container').innerText += 'Unhandled Promise Rejection: ' + (event.reason ? event.reason.stack || event.reason : 'Unknown') + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
